name: Q&A データ更新（毎日）

on:
  push:
    branches: [main]
    paths: ['scripts/**', '.github/workflows/update_daily.yml']
  schedule:
    - cron: '0 0 * * *'  # 毎日 09:00 JST
  workflow_dispatch:       # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Q&Aデータ取得
        run: python scripts/fetch_json.py

      - name: サイト再生成
        run: python scripts/build_site.py

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/qas.json index.html
          git diff --cached --quiet || git commit -m "chore: Q&A更新 $(date -u '+%Y-%m-%d')"
          git push
